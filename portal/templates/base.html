<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>{% block title %}ContractorAI{% endblock %} — Sanz Construction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}">ContractorAI</a>
    <nav class="nav">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <small>Sanz Construction · NYC</small>
  </footer>
</body>
</html>

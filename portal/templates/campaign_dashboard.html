<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Intelligence — Contractor AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: #63b3ed; letter-spacing: -0.5px; }
    nav a { color: #a0aec0; text-decoration: none; font-size: 0.875rem; }
    nav a:hover, nav a.active { color: #e2e8f0; }

    /* ── Layout ── */
    .page { display: flex; height: calc(100vh - 56px); }

    /* ── Filter Panel ── */
    .filter-panel {
      width: 240px;
      min-width: 240px;
      background: #1a1f2e;
      border-right: 1px solid #2d3748;
      padding: 20px 16px;
      overflow-y: auto;
    }
    .filter-panel h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 12px;
    }
    .filter-group { margin-bottom: 20px; }
    .filter-group label {
      display: block;
      font-size: 0.8rem;
      color: #a0aec0;
      margin-bottom: 4px;
    }
    .filter-group select,
    .filter-group input[type="text"],
    .filter-group input[type="number"] {
      width: 100%;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 6px 10px;
      font-size: 0.825rem;
    }
    .filter-group select:focus,
    .filter-group input:focus { outline: none; border-color: #63b3ed; }

    .btn-apply {
      width: 100%;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .btn-apply:hover { background: #2b6cb0; }
    .btn-clear {
      width: 100%;
      background: transparent;
      color: #718096;
      border: 1px solid #4a5568;
      border-radius: 6px;
      padding: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-clear:hover { border-color: #718096; color: #a0aec0; }

    /* ── Main content ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-header h1 { font-size: 1.25rem; font-weight: 600; }
    .page-header .subtitle { font-size: 0.8rem; color: #718096; margin-top: 2px; }

    /* ── Bulk ops bar ── */
    .bulk-bar {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .bulk-bar .selected-count { font-size: 0.825rem; color: #a0aec0; min-width: 100px; }
    .bulk-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .bulk-btn:hover { background: #4a5568; }
    .bulk-btn.danger { color: #fc8181; border-color: #fc8181; }
    .bulk-btn.danger:hover { background: #742a2a; }
    .bulk-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: #63b3ed; }
    .stat-card .label { font-size: 0.75rem; color: #718096; margin-top: 2px; }

    /* ── Lead table ── */
    .table-wrap {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #2d3748; }
    th {
      padding: 10px 12px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
    }
    td {
      padding: 10px 12px;
      font-size: 0.825rem;
      border-top: 1px solid #2d3748;
    }
    tr:hover td { background: #252c3d; cursor: pointer; }
    tr.selected td { background: #1e3a5f; }

    /* ── Score badge ── */
    .score-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .score-high  { background: #276749; color: #9ae6b4; }
    .score-med   { background: #7b341e; color: #fbd38d; }
    .score-low   { background: #4a1942; color: #f9a8d4; }
    .score-none  { background: #2d3748; color: #718096; }

    /* ── Status pill ── */
    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.72rem;
    }
    .status-none      { background: #2d3748; color: #718096; }
    .status-pending   { background: #2c5282; color: #90cdf4; }
    .status-sent      { background: #276749; color: #9ae6b4; }
    .status-replied   { background: #553c9a; color: #d6bcfa; }
    .status-converted { background: #276749; color: #68d391; }

    /* ── Expand row ── */
    .expand-row td {
      padding: 0;
      background: #151820;
    }
    .expand-content {
      padding: 16px 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      font-size: 0.8rem;
    }
    .expand-field label { color: #718096; font-size: 0.72rem; display: block; margin-bottom: 2px; }
    .expand-field value, .expand-field .val { color: #e2e8f0; }
    .expand-actions { grid-column: 1/-1; display: flex; gap: 8px; margin-top: 4px; }
    .action-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .action-btn.primary { background: #3182ce; border-color: #3182ce; }
    .action-btn:hover { background: #4a5568; }
    .action-btn.primary:hover { background: #2b6cb0; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      font-size: 0.825rem;
      color: #a0aec0;
    }
    .page-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #718096;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #276749;
      color: #9ae6b4;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.875rem;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">Contractor AI</span>
  <a href="/campaigns" class="active">Campaigns</a>
  <a href="/campaigns/leads">Leads</a>
  <a href="/health">Status</a>
</nav>

<div class="page">

  <!-- Filter Panel -->
  <aside class="filter-panel">
    <h3>Filters</h3>

    <div class="filter-group">
      <label>Outreach Status</label>
      <select id="filter-outreach">
        <option value="">All</option>
        <option value="none">None</option>
        <option value="pending">Pending</option>
        <option value="sent">Sent</option>
        <option value="replied">Replied</option>
        <option value="converted">Converted</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Enrichment Status</label>
      <select id="filter-enrichment">
        <option value="">All</option>
        <option value="complete">Complete</option>
        <option value="partial">Partial</option>
        <option value="pending">Pending</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Min Score</label>
      <input type="number" id="filter-min-score" min="0" max="1" step="0.1" placeholder="0.0">
    </div>

    <div class="filter-group">
      <label>Borough</label>
      <select id="filter-borough">
        <option value="">All</option>
        <option>Manhattan</option>
        <option>Brooklyn</option>
        <option>Queens</option>
        <option>Bronx</option>
        <option>Staten Island</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Trade</label>
      <select id="filter-trade">
        <option value="">All</option>
        <option value="general">General</option>
        <option value="plumbing">Plumbing</option>
        <option value="electrical">Electrical</option>
        <option value="hvac">HVAC</option>
        <option value="demolition">Demolition</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Campaign Tag</label>
      <input type="text" id="filter-tag" placeholder="e.g. c3-nyc">
    </div>

    <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
    <button class="btn-clear" onclick="clearFilters()">Clear</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="page-header">
      <div>
        <h1>Contact List</h1>
        <div class="subtitle">Enriched leads ready for outreach</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="bulk-btn" onclick="exportCSV()">Export CSV</button>
        <button class="bulk-btn" onclick="runEnrichment()" style="background:#2c5282;border-color:#4299e1;color:#bee3f8;">Enrich Selected</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="value" id="stat-total">—</div><div class="label">Total Leads</div></div>
      <div class="stat-card"><div class="value" id="stat-enriched">—</div><div class="label">Enriched</div></div>
      <div class="stat-card"><div class="value" id="stat-contacted">—</div><div class="label">Contacted</div></div>
      <div class="stat-card"><div class="value" id="stat-avg-score">—</div><div class="label">Avg Score</div></div>
    </div>

    <!-- Bulk bar -->
    <div class="bulk-bar">
      <div class="selected-count"><span id="sel-count">0</span> selected</div>
      <button class="bulk-btn" id="btn-bulk-campaign" disabled onclick="bulkAddToCampaign()">Add to Campaign</button>
      <button class="bulk-btn" id="btn-bulk-enrich"   disabled onclick="bulkEnrich()">Enrich Now</button>
      <button class="bulk-btn danger" id="btn-bulk-remove" disabled onclick="bulkRemove()">Remove</button>
      <div style="flex:1;"></div>
      <label style="font-size:0.8rem;color:#a0aec0;">
        <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"> Select all
      </label>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="leads-table">
        <thead>
          <tr>
            <th style="width:36px;"><input type="checkbox" id="header-check" onchange="toggleSelectAll(this)"></th>
            <th>Company</th>
            <th>Contact</th>
            <th>Borough</th>
            <th>Trade</th>
            <th>Score</th>
            <th>Outreach</th>
            <th>Email</th>
            <th>Phone</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <tr><td colspan="10"><div class="empty-state"><div class="icon">⚡</div>Loading leads…</div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
      <span id="page-info">Page 1</span>
      <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allLeads = [];
  let filtered = [];
  let page = 1;
  const PAGE_SIZE = 25;
  let selectedIds = new Set();
  let expandedRow = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    fetchLeads();
  });

  async function fetchLeads() {
    try {
      const res = await fetch('/api/campaigns/leads');
      const data = await res.json();
      allLeads = data.leads || [];
      filtered = allLeads;
      updateStats();
      renderPage();
    } catch (e) {
      showToast('Failed to load leads: ' + e.message, true);
    }
  }

  // ── Filters ───────────────────────────────────────────────────────────────
  function applyFilters() {
    const outreach  = document.getElementById('filter-outreach').value;
    const enrichSt  = document.getElementById('filter-enrichment').value;
    const minScore  = parseFloat(document.getElementById('filter-min-score').value) || 0;
    const borough   = document.getElementById('filter-borough').value;
    const trade     = document.getElementById('filter-trade').value;
    const tag       = document.getElementById('filter-tag').value.toLowerCase();

    filtered = allLeads.filter(l => {
      if (outreach && l.outreach_status !== outreach) return false;
      if (enrichSt && l.enrichment_status !== enrichSt) return false;
      if (l.enrichment_score < minScore) return false;
      if (borough && l.borough !== borough) return false;
      if (trade) {
        const tags = (l.campaign_tags || '').toLowerCase();
        if (!tags.includes(trade)) return false;
      }
      if (tag && !(l.campaign_tags || '').toLowerCase().includes(tag)) return false;
      return true;
    });

    page = 1;
    selectedIds.clear();
    updateStats();
    renderPage();
  }

  function clearFilters() {
    ['filter-outreach','filter-enrichment','filter-borough','filter-trade'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('filter-min-score').value = '';
    document.getElementById('filter-tag').value = '';
    filtered = allLeads;
    page = 1;
    selectedIds.clear();
    updateStats();
    renderPage();
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('stat-total').textContent = filtered.length;
    const enriched = filtered.filter(l => l.enrichment_status === 'complete').length;
    document.getElementById('stat-enriched').textContent = enriched;
    const contacted = filtered.filter(l => l.outreach_status && l.outreach_status !== 'none').length;
    document.getElementById('stat-contacted').textContent = contacted;
    const scores = filtered.map(l => l.enrichment_score || 0);
    const avg = scores.length ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(2) : '—';
    document.getElementById('stat-avg-score').textContent = avg;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderPage() {
    const start = (page - 1) * PAGE_SIZE;
    const pageLeads = filtered.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById('leads-tbody');

    if (!pageLeads.length) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="icon">📭</div>No leads match your filters</div></td></tr>`;
      document.getElementById('page-info').textContent = 'Page 0';
      document.getElementById('btn-prev').disabled = true;
      document.getElementById('btn-next').disabled = true;
      return;
    }

    tbody.innerHTML = pageLeads.map(l => buildRow(l)).join('');

    document.getElementById('page-info').textContent = `Page ${page} / ${Math.ceil(filtered.length / PAGE_SIZE)}`;
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= Math.ceil(filtered.length / PAGE_SIZE);

    updateBulkBar();
  }

  function buildRow(l) {
    const checked = selectedIds.has(l.id) ? 'checked' : '';
    const selClass = selectedIds.has(l.id) ? 'selected' : '';
    return `
      <tr class="${selClass}" data-id="${l.id}">
        <td><input type="checkbox" ${checked} onchange="toggleSelect(${l.id}, this)" onclick="event.stopPropagation()"></td>
        <td onclick="toggleExpand(${l.id})">${escHtml(l.company || l.name || '—')}</td>
        <td onclick="toggleExpand(${l.id})">${escHtml(l.name || '—')}</td>
        <td onclick="toggleExpand(${l.id})">${escHtml(l.borough || '—')}</td>
        <td onclick="toggleExpand(${l.id})">${escHtml(l.campaign_tags || '—')}</td>
        <td onclick="toggleExpand(${l.id})">${scoreBadge(l.enrichment_score)}</td>
        <td onclick="toggleExpand(${l.id})">${statusPill(l.outreach_status)}</td>
        <td onclick="toggleExpand(${l.id})">${l.enriched_email || l.email ? '✓' : '<span style="color:#718096">—</span>'}</td>
        <td onclick="toggleExpand(${l.id})">${l.enriched_phone || l.phone ? '✓' : '<span style="color:#718096">—</span>'}</td>
        <td><button class="action-btn" onclick="event.stopPropagation();toggleExpand(${l.id})">▾</button></td>
      </tr>
      <tr class="expand-row" id="expand-${l.id}" style="display:none;">
        <td colspan="10">${buildExpandContent(l)}</td>
      </tr>
    `;
  }

  function buildExpandContent(l) {
    return `
      <div class="expand-content">
        <div class="expand-field"><label>Email</label><div class="val">${escHtml(l.enriched_email || l.email || '—')}</div></div>
        <div class="expand-field"><label>Email Source</label><div class="val">${escHtml(l.email_source || '—')}</div></div>
        <div class="expand-field"><label>Phone</label><div class="val">${escHtml(l.enriched_phone || l.phone || '—')}</div></div>
        <div class="expand-field"><label>Phone Source</label><div class="val">${escHtml(l.phone_source || '—')}</div></div>
        <div class="expand-field"><label>Website</label><div class="val">${l.website ? `<a href="${escHtml(l.website)}" target="_blank" style="color:#63b3ed">${escHtml(l.website)}</a>` : '—'}</div></div>
        <div class="expand-field"><label>Enriched At</label><div class="val">${l.enriched_at ? new Date(l.enriched_at).toLocaleDateString() : '—'}</div></div>
        <div class="expand-field"><label>Enrichment Score</label><div class="val">${(l.enrichment_score || 0).toFixed(3)}</div></div>
        <div class="expand-field"><label>Last Contacted</label><div class="val">${l.last_contacted_at ? new Date(l.last_contacted_at).toLocaleDateString() : '—'}</div></div>
        <div class="expand-field"><label>Notes</label><div class="val">${escHtml(l.notes || '—')}</div></div>
        <div class="expand-actions">
          <button class="action-btn primary" onclick="generateProposal(${l.id})">Generate Proposal</button>
          <button class="action-btn" onclick="enrichSingle(${l.id})">Re-enrich</button>
          <button class="action-btn" onclick="addToNewCampaign(${l.id})">Add to Campaign</button>
          <button class="action-btn" onclick="markContacted(${l.id})">Mark Contacted</button>
        </div>
      </div>
    `;
  }

  // ── Expand ────────────────────────────────────────────────────────────────
  function toggleExpand(id) {
    const row = document.getElementById(`expand-${id}`);
    if (!row) return;
    if (expandedRow && expandedRow !== id) {
      const prev = document.getElementById(`expand-${expandedRow}`);
      if (prev) prev.style.display = 'none';
    }
    row.style.display = row.style.display === 'none' ? '' : 'none';
    expandedRow = row.style.display !== 'none' ? id : null;
  }

  // ── Selection ─────────────────────────────────────────────────────────────
  function toggleSelect(id, el) {
    if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
    const row = el.closest('tr');
    if (row) row.className = el.checked ? 'selected' : '';
    updateBulkBar();
  }

  function toggleSelectAll(el) {
    const checks = document.querySelectorAll('#leads-tbody input[type=checkbox]');
    checks.forEach(c => {
      c.checked = el.checked;
      const id = parseInt(c.closest('tr').dataset.id);
      if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
      const row = c.closest('tr');
      if (row) row.className = el.checked ? 'selected' : '';
    });
    document.getElementById('select-all').checked = el.checked;
    document.getElementById('header-check').checked = el.checked;
    updateBulkBar();
  }

  function updateBulkBar() {
    const n = selectedIds.size;
    document.getElementById('sel-count').textContent = n;
    ['btn-bulk-campaign','btn-bulk-enrich','btn-bulk-remove'].forEach(id => {
      document.getElementById(id).disabled = n === 0;
    });
  }

  // ── Pagination ────────────────────────────────────────────────────────────
  function changePage(dir) {
    page += dir;
    renderPage();
    window.scrollTo(0, 0);
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function enrichSingle(id) {
    showToast('Enriching lead…');
    try {
      const r = await fetch(`/api/campaigns/leads/${id}/enrich`, { method: 'POST' });
      const d = await r.json();
      showToast('Enrichment complete');
      fetchLeads();
    } catch (e) { showToast('Enrich failed: ' + e.message, true); }
  }

  async function bulkEnrich() {
    if (!selectedIds.size) return;
    showToast(`Enriching ${selectedIds.size} leads…`);
    try {
      const r = await fetch('/api/campaigns/leads/bulk-enrich', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ lead_ids: [...selectedIds] })
      });
      const d = await r.json();
      showToast(`Enriched ${d.enriched || selectedIds.size} leads`);
      selectedIds.clear();
      fetchLeads();
    } catch (e) { showToast('Bulk enrich failed: ' + e.message, true); }
  }

  async function generateProposal(id) {
    showToast('Generating proposal…');
    try {
      const r = await fetch(`/api/campaigns/leads/${id}/proposal`, { method: 'POST' });
      const d = await r.json();
      showToast('Proposal saved — ID: ' + (d.proposal_id || 'generated'));
    } catch (e) { showToast('Proposal failed: ' + e.message, true); }
  }

  async function markContacted(id) {
    try {
      await fetch(`/api/campaigns/leads/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ outreach_status: 'sent', last_contacted_at: new Date().toISOString() })
      });
      showToast('Marked as contacted');
      fetchLeads();
    } catch (e) { showToast('Update failed: ' + e.message, true); }
  }

  async function bulkAddToCampaign() {
    const name = prompt('Campaign name (or ID):');
    if (!name) return;
    try {
      const r = await fetch('/api/campaigns/assign-leads', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ campaign_name: name, lead_ids: [...selectedIds] })
      });
      const d = await r.json();
      showToast(`Added to campaign "${name}"`);
      selectedIds.clear();
      renderPage();
    } catch (e) { showToast('Failed: ' + e.message, true); }
  }

  async function addToNewCampaign(id) {
    const name = prompt('Campaign name:');
    if (!name) return;
    try {
      await fetch('/api/campaigns/assign-leads', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ campaign_name: name, lead_ids: [id] })
      });
      showToast('Added to campaign');
    } catch (e) { showToast('Failed: ' + e.message, true); }
  }

  async function bulkRemove() {
    if (!confirm(`Remove ${selectedIds.size} leads?`)) return;
    // Local filter only for now
    const ids = new Set(selectedIds);
    allLeads = allLeads.filter(l => !ids.has(l.id));
    filtered = filtered.filter(l => !ids.has(l.id));
    selectedIds.clear();
    updateStats();
    renderPage();
    showToast(`Removed ${ids.size} leads from view`);
  }

  function exportCSV() {
    const rows = filtered;
    const cols = ['id','name','company','email','enriched_email','phone','enriched_phone','website','borough','enrichment_score','outreach_status','enriched_at'];
    const header = cols.join(',');
    const lines = rows.map(l => cols.map(c => JSON.stringify(l[c] ?? '')).join(','));
    const blob = new Blob([header + '\n' + lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'leads_export.csv';
    a.click();
  }

  function runEnrichment() {
    if (selectedIds.size) bulkEnrich(); else showToast('Select leads first');
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function scoreBadge(score) {
    const s = parseFloat(score) || 0;
    if (s >= 0.75) return `<span class="score-badge score-high">${s.toFixed(2)}</span>`;
    if (s >= 0.5)  return `<span class="score-badge score-med">${s.toFixed(2)}</span>`;
    if (s > 0)     return `<span class="score-badge score-low">${s.toFixed(2)}</span>`;
    return `<span class="score-badge score-none">—</span>`;
  }

  function statusPill(st) {
    st = st || 'none';
    return `<span class="status-pill status-${st}">${st}</span>`;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, isErr=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isErr ? '#742a2a' : '#276749';
    t.style.color = isErr ? '#fc8181' : '#9ae6b4';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaigns — Contractor AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='campaigns.css') }}">
</head>
<body>
  <nav>
    <div class="nav-brand">Contractor AI</div>
    <div class="nav-links">
      <a href="/campaigns" class="active">Campaigns</a>
      <a href="/leads">Leads</a>
      <a href="/proposals">Proposals</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="page-header">
      <h1>Campaigns</h1>
      <button class="btn-primary" onclick="toggleNewCampaignForm()">+ New Campaign</button>
    </div>

    <!-- Inline New Campaign Form -->
    <div id="new-campaign-form" class="form-container" style="display: none;">
      <div class="form-header">
        <h3>Create New Campaign</h3>
        <button class="btn-close" onclick="toggleNewCampaignForm()">&times;</button>
      </div>
      <form id="campaign-form" onsubmit="submitCampaign(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Campaign Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="target_trade">Target Trade</label>
            <select id="target_trade" name="target_trade">
              <option value="plumbing">Plumbing</option>
              <option value="electrical">Electrical</option>
              <option value="hvac">HVAC</option>
              <option value="general">General Contracting</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="target_borough">Target Borough</label>
            <select id="target_borough" name="target_borough">
              <option value="manhattan">Manhattan</option>
              <option value="brooklyn">Brooklyn</option>
              <option value="queens">Queens</option>
              <option value="bronx">Bronx</option>
              <option value="staten-island">Staten Island</option>
            </select>
          </div>
          <div class="form-group">
            <label for="brand">Brand</label>
            <input type="text" id="brand" name="brand" placeholder="e.g., NYC Pro Contractors">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="toggleNewCampaignForm()">Cancel</button>
          <button type="submit" class="btn-primary">Create Campaign</button>
        </div>
      </form>
    </div>

    <!-- Campaigns Table -->
    <div class="table-container">
      <table id="campaigns-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Angle</th>
            <th>Trade</th>
            <th>Borough</th>
            <th>Lead Count</th>
            <th>Enriched Count</th>
            <th>Proposals Sent</th>
            <th>Replies</th>
            <th>Interested</th>
          </tr>
        </thead>
        <tbody id="campaigns-tbody">
          <!-- Campaigns will be loaded here -->
        </tbody>
      </table>
    </div>

    <!-- Expandable Stats Panel -->
    <div id="stats-panel" class="stats-panel" style="display: none;">
      <div class="stats-header">
        <h3 id="stats-title">Campaign Statistics</h3>
        <button class="btn-close" onclick="closeStatsPanel()">&times;</button>
      </div>
      <div class="stats-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="conversion-rate">--</div>
            <div class="stat-label">Conversion Rate</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="avg-response-time">--</div>
            <div class="stat-label">Avg Response Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="cost-per-lead">--</div>
            <div class="stat-label">Cost per Lead</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="roi">--</div>
            <div class="stat-label">ROI</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="quality-score">--</div>
            <div class="stat-label">Quality Score</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='campaigns.js') }}"></script>
</body>
</html>

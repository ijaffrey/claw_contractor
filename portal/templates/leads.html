<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Leads</h1>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary">Home</a>
                <button class="btn btn-primary">Export Leads</button>
            </div>
        </header>

        <!-- Filter Controls -->
        <div class="filter-container">
            <div class="filter-group">
                <label for="tradeFilter">Filter by Trade:</label>
                <select id="tradeFilter">
                    <option value="">All Trades</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="boroughFilter">Filter by Borough:</label>
                <select id="boroughFilter">
                    <option value="">All Boroughs</option>
                    <option value="Manhattan">Manhattan</option>
                    <option value="Brooklyn">Brooklyn</option>
                    <option value="Queens">Queens</option>
                    <option value="Bronx">Bronx</option>
                    <option value="Staten Island">Staten Island</option>
                </select>
            </div>
            <button id="clearFilters" class="btn btn-secondary">Clear Filters</button>
        </div>

        <div class="table-container">
            <table class="portal-table" id="leadsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Trade</th>
                        <th>Borough</th>
                        <th>Enrichment Score</th>
                        <th>Date Created</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Table rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='leads.js') }}"></script>
</body>
</html>

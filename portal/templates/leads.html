<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Leads</h1>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary">Home</a>
                <button class="btn btn-primary">Export Leads</button>
            </div>
        </header>

        <!-- Filter Controls -->
        <div class="filter-container">
            <div class="filter-group">
                <label for="tradeFilter">Filter by Trade:</label>
                <select id="tradeFilter">
                    <option value="">All Trades</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="boroughFilter">Filter by Borough:</label>
                <select id="boroughFilter">
                    <option value="">All Boroughs</option>
                    <option value="Manhattan">Manhattan</option>
                    <option value="Brooklyn">Brooklyn</option>
                    <option value="Queens">Queens</option>
                    <option value="Bronx">Bronx</option>
                    <option value="Staten Island">Staten Island</option>
                </select>
            </div>
            <button id="clearFilters" class="btn btn-secondary">Clear Filters</button>
        </div>

        <div class="table-container">
            <table class="portal-table" id="leadsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Trade</th>
                        <th>Borough</th>
                        <th>Enrichment Score</th>
                        <th>Date Created</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Table rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='leads.js') }}"></script>
</body>
</html>
    <!-- Lead Detail Panel -->
    <div id="leadDetailPanel" class="detail-panel">
        <div class="detail-panel-overlay"></div>
        <div class="detail-panel-content">
            <div class="detail-panel-header">
                <h2 id="detailLeadName">Lead Details</h2>
                <button id="closeDetailPanel" class="close-btn">&times;</button>
            </div>
            
            <div class="detail-panel-body">
                <!-- Contact Information -->
                <div class="detail-section">
                    <h3>Contact Information</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Name:</label>
                            <span id="detailName">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Email:</label>
                            <span id="detailEmail">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Phone:</label>
                            <span id="detailPhone">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Address:</label>
                            <span id="detailAddress">-</span>
                        </div>
                    </div>
                </div>

                <!-- Project Details -->
                <div class="detail-section">
                    <h3>Project Information</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Trade:</label>
                            <span id="detailTrade">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Borough:</label>
                            <span id="detailBorough">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Project Type:</label>
                            <span id="detailProjectType">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Budget Range:</label>
                            <span id="detailBudget">-</span>
                        </div>
                    </div>
                </div>

                <!-- Enrichment Details -->
                <div class="detail-section">
                    <h3>Lead Enrichment</h3>
                    <div class="enrichment-score">
                        <div class="score-display">
                            <span class="score-label">Enrichment Score:</span>
                            <span id="detailEnrichmentScore" class="score-value">-</span>
                        </div>
                        <div class="score-breakdown">
                            <div class="breakdown-item">
                                <span>Contact Verification:</span>
                                <span id="detailContactScore" class="breakdown-score">-</span>
                            </div>
                            <div class="breakdown-item">
                                <span>Project Viability:</span>
                                <span id="detailProjectScore" class="breakdown-score">-</span>
                            </div>
                            <div class="breakdown-item">
                                <span>Budget Qualification:</span>
                                <span id="detailBudgetScore" class="breakdown-score">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Interaction History -->
                <div class="detail-section">
                    <h3>Interaction History</h3>
                    <div id="detailInteractionHistory" class="interaction-timeline">
                        <!-- Mock interaction history will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Leads</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Campaign Leads</h1>
            <div class="header-actions">
                <button class="btn btn-primary">Import Leads</button>
            </div>
        </header>

        <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-group">
                <label>Trade:</label>
                <select id="trade-filter">
                    <option value="">All Trades</option>
                    <option value="General Contractor">General Contractor</option>
                    <option value="Plumber">Plumber</option>
                    <option value="Electrician">Electrician</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Borough:</label>
                <select id="borough-filter">
                    <option value="">All Boroughs</option>
                    <option value="Manhattan">Manhattan</option>
                    <option value="Brooklyn">Brooklyn</option>
                    <option value="Queens">Queens</option>
                    <option value="Bronx">Bronx</option>
                    <option value="Staten Island">Staten Island</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Score Range:</label>
                <input type="range" id="score-min" min="0" max="100" value="0">
                <span id="score-range">0 - 100</span>
                <input type="range" id="score-max" min="0" max="100" value="100">
            </div>
            <div class="filter-group">
                <label>Outreach Status:</label>
                <select id="status-filter">
                    <option value="">All Status</option>
                    <option value="Not Contacted">Not Contacted</option>
                    <option value="Contacted">Contacted</option>
                    <option value="Responded">Responded</option>
                </select>
            </div>
        </div>

        <!-- Bulk Operations Bar -->
        <div id="bulk-operations" class="bulk-operations" style="display: none;">
            <div class="bulk-info">
                <span id="selected-count">0</span> leads selected
            </div>
            <div class="bulk-actions">
                <button class="btn btn-secondary" id="bulk-enrich">Enrich</button>
                <button class="btn btn-secondary" id="bulk-proposals">Generate Proposals</button>
                <button class="btn btn-secondary" id="bulk-export">Export CSV</button>
                <button class="btn btn-secondary" id="bulk-tag">Tag Campaign</button>
            </div>
        </div>

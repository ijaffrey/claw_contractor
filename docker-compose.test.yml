version: '3.8'

services:
  # Test Database
  test-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: test_leads
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - test_db_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_leads"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # Redis for caching and session storage
  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --requirepass test_redis_password
    volumes:
      - test_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - test-network

  # Application container for testing
  test-app:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.test
    environment:
      - DATABASE_URL=postgresql://test_user:test_password@test-db:5432/test_leads
      - REDIS_URL=redis://:test_redis_password@test-redis:6379/0
      - TESTING=True
      - DEBUG=True
      - MAIL_SUPPRESS_SEND=True
      - LOG_LEVEL=INFO
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    ports:
      - "8081:8000"
    volumes:
      - ./logs:/app/logs
      - ./test_data:/app/test_data
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - test-network

  # Log aggregation with Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=test_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - test-network

volumes:
  test_db_data:
  test_redis_data:
  prometheus_data:
  grafana_data:

networks:
  test-network:
    driver: bridge
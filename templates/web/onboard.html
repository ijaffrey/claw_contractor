<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Profile — ContractorAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .wordmark {
            text-align: center;
            margin-bottom: 2rem;
        }

        .wordmark h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 2rem;
        }

        .gmail-badge {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }

        label .optional {
            font-weight: 400;
            color: #a0aec0;
            font-size: 0.85rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea { resize: vertical; min-height: 80px; }

        .help-text {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-top: 0.3rem;
        }

        .submit-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.3);
            margin-top: 2rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(72, 187, 120, 0.4);
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wordmark">
            <h1>ContractorAI</h1>
        </div>

        <div class="card">
            <h2>Tell us about your business</h2>
            <p class="subtitle">We'll use this to match you with the right jobs and reply to leads in your voice.</p>

            {% if gmail_email %}
            <div class="gmail-badge">Connected: {{ gmail_email }}</div>
            {% endif %}

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/onboard">
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" name="business_name" placeholder="e.g. Smith's Plumbing" required>
                </div>

                <div class="form-group">
                    <label>Trade Type</label>
                    <select name="trade_type" required>
                        <option value="">Select your trade...</option>
                        <option value="plumbing">Plumbing</option>
                        <option value="electrical">Electrical</option>
                        <option value="hvac">HVAC</option>
                        <option value="general contractor">General Contractor</option>
                        <option value="roofing">Roofing</option>
                        <option value="painting">Painting</option>
                        <option value="carpentry">Carpentry</option>
                        <option value="masonry">Masonry</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Name <span class="optional">(optional)</span></label>
                    <input type="text" name="owner_name" placeholder="e.g. John Smith">
                </div>

                <div class="form-group">
                    <label>Phone <span class="optional">(optional)</span></label>
                    <input type="tel" name="phone" placeholder="e.g. 555-123-4567">
                </div>

                <div class="form-group">
                    <label>Service Area <span class="optional">(optional)</span></label>
                    <input type="text" name="service_area" placeholder="e.g. Brooklyn, Queens, Manhattan">
                </div>

                <div class="form-group">
                    <label>Brand Voice</label>
                    <textarea name="brand_voice" placeholder="How do you talk to customers? e.g. 'Friendly, professional, straight to the point'" required></textarea>
                    <p class="help-text">This is how our AI will reply to leads on your behalf.</p>
                </div>

                <button type="submit" class="submit-btn">Get Started</button>
            </form>
        </div>
    </div>
</body>
</html>

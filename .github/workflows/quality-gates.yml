name: Code Quality Gates

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install quality tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy pylint safety bandit
        pip install -r requirements.txt
    
    - name: Code formatting check
      run: |
        echo "::group::Black formatting check"
        black --check --diff . || {
          echo "::error::Code formatting issues found. Run 'black .' to fix."
          exit 1
        }
        echo "::endgroup::"
    
    - name: Linting with flake8
      run: |
        echo "::group::Flake8 linting"
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --format='::error file=%(path)s,line=%(row)d,col=%(col)d::[flake8] %(code)s: %(text)s'
        echo "::endgroup::"
    
    - name: Advanced linting with pylint
      run: |
        echo "::group::Pylint analysis"
        pylint --exit-zero --output-format=colorized *.py || true
        echo "::endgroup::"
    
    - name: Type checking with mypy
      run: |
        echo "::group::MyPy type checking"
        mypy --ignore-missing-imports --show-error-codes . || {
          echo "::warning::Type checking found potential issues"
        }
        echo "::endgroup::"
    
    - name: Security scan with bandit
      run: |
        echo "::group::Bandit security scan"
        bandit -r . -f json -o bandit-report.json || true
        if [ -f bandit-report.json ]; then
          cat bandit-report.json | jq -r '.results[] | "::warning file=" + .filename + ",line=" + (.line_number|tostring) + "::" + .issue_text'
        fi
        echo "::endgroup::"
    
    - name: Dependency vulnerability check
      run: |
        echo "::group::Safety vulnerability scan"
        safety check --json || {
          echo "::warning::Potential security vulnerabilities found in dependencies"
        }
        echo "::endgroup::"

  test-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov coverage
    
    - name: Run tests with coverage
      env:
        TESTING: true
      run: |
        echo "::group::Running tests with coverage"
        coverage run --source=. -m pytest -v --tb=short
        coverage report --show-missing
        coverage xml
        echo "::endgroup::"
    
    - name: Coverage gate
      run: |
        echo "::group::Coverage gate check"
        COVERAGE=$(coverage report --format=total)
        echo "Current coverage: ${COVERAGE}%"
        if [ "$COVERAGE" -lt 70 ]; then
          echo "::error::Coverage ${COVERAGE}% is below required 70%"
          exit 1
        fi
        echo "::notice::Coverage ${COVERAGE}% meets minimum requirement"
        echo "::endgroup::"
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage.xml
          htmlcov/
        retention-days: 7

  integration-tests:
    runs-on: ubuntu-latest
    needs: [code-quality, test-coverage]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run integration tests
      env:
        TESTING: true
      run: |
        echo "::group::Health check validation"
        python3 test_health_check.py || {
          echo "::error::Health check failed"
          exit 1
        }
        echo "::endgroup::"
        
        echo "::group::Basic system tests"
        python3 run_basic_tests.py || {
          echo "::error::Basic system tests failed"
          exit 1
        }
        echo "::endgroup::"
    
    - name: Deployment readiness check
      run: |
        echo "::group::Deployment readiness"
        echo "Checking deployment prerequisites..."
        
        # Check required files exist
        required_files=("main.py" "config.py" "requirements.txt" "Procfile")
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "::error::Required file missing: $file"
            exit 1
          fi
        done
        
        # Validate Python imports
        python3 -c "import main; print('Main module imports successfully')"
        
        echo "::notice::All deployment prerequisites satisfied"
        echo "::endgroup::"
